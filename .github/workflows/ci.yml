name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: wedding_rsvp_test
          POSTGRES_USER: wedding_rsvp
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://wedding_rsvp:testpassword@localhost:5432/wedding_rsvp_test
      ADMIN_PASSWORD: testadmin
      SESSION_SECRET: testsessionsecretatleast32charslongforthis
      SESSION_COOKIE_SECURE: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run database migrations
        run: npm run db:migrate

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate deployment scripts
        run: bash -n install.sh update.sh
